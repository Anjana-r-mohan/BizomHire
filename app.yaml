runtime: nodejs18

instance_class: F1

env_variables:
  NODE_ENV: "production"
  SESSION_SECRET: "bizomhire-secure-session-key-2026-change-this-in-production"

handlers:
  # Serve static files from /public directory
  - url: /(.+\.(js|css|html|ico|png|jpg|jpeg|svg|webp))$
    static_files: public/\1
    upload: public/(.+\.(js|css|html|ico|png|jpg|jpeg|svg|webp))$
    secure: always
  
  # Serve index.html for root path
  - url: /
    static_files: public/index.html
    upload: public/index.html
    secure: always
  
  # API routes handled by Node.js app
  - url: /.*
    script: auto
    secure: always

automatic_scaling:
  min_idle_instances: 0
  max_idle_instances: 1
  min_pending_latency: 30ms
  max_pending_latency: automatic
  max_concurrent_requests: 50
